    <h1>
        CoyoteScriptについて
    </h1>
    <p>WebSexToysPlayerでは、DG-Lab COYOTE 3.0を連動させるための専用のスクリプト形式に対応しています。<br />
        拡張子は <code style="background-color:#dddddd;padding:2px;">.coyotescript</code> です。書式は以下です。</p>

    <pre style="background-color:#dddddd;padding: 1em; width: fit-content;"><code>時間(ミリ秒単位),周波数(10-100),出力(0-100)
時間(ミリ秒単位),周波数(10-100),出力(0-100)
時間(ミリ秒単位),周波数(10-100),出力(0-100)
...</code></pre>

    <p>ご覧の通り、中身はCSVそのものです。<br />Vorzeの回転式CSVの1列目（時間）をミリ秒単位に、2列目（回転方向）を周波数に変えたものだと思ってください。</p>
</body>
