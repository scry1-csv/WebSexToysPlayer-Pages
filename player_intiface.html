<!doctype html>
<html lang="ja">

<head>
	<link rel="stylesheet" href="main.css">
	<link rel="shortcut icon" href="#">
	<title>WebSexToysPlayer for Intiface</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div id="header">
		<a href="player_wasm.html">単独動作版</a>
		<a href="https://github.com/scry1-csv/WebSexToysPlayer">GitHub</a>
		<a target="_blank" href="README_ja.html">使い方</a>
	</div>
	<hr />
	<div class="ui">
		<input id="serverURL" type="text" value="localhost:12345">
		<button id="connectServerButton">Intifaceへ接続</button>
		接続状態 <span id="connectStatus"></span>
	</div>
	<video id="player" src="" controls></video>
	<div class="ui" id="seekUi">
		<span id="seekHourSpan"><input id="seekHourInput" type="number" style="width:3em;" min="0" value="0">時</span>
		<span id="seekMinuteSpan"><input id="seekMinuteInput" type="number" style="width:3em;" min="0" max="59"
				value="0">分</span>
		<span id="seekSecondSpan"><input id="seekSecondInput" type="number" style="width:3em;" min="0" max="59"
				value="0">秒</span>
		<button id="seekButton" type="button">シーク</button>
	</div>
	<div class="ui">
		<input id="mediaInput" type="file" accept="video/*,audio/*" style="display: none;" />
		<button id="mediaButton" type="button">動画や音声を選択</button>
		<span id="mediaNameSpan"></span>
	</div>
	<div class="ui">
		<input id="scriptInput" type="file" accept="text/csv,.funscript,.coyotescript" style="display: none;" />
		<button id="scriptButton" type="button">スクリプトを選択</button>
	</div>
	<div class="ui">
		<button id="connectDeviceButton">デバイス接続</button>
		<button id="coyoteConnectButton">Coyote接続</button>
	</div>
	<div class="ui"><button id="forceStopButton">強制停止</button></div>

	<div>
		<h3>設定</h3>
		<ul>
			<li>
				オフセット:<input id="offset" type="number" style="width:4em;" value="0" step="0.1" />秒
				<button id="offsetPlusButton" type="button">+</button>
				<button id="offsetMinusButton" type="button">-</button>
			</li>
			<li class="UFOTWsettingli" style="display: none;">
				<input id="UFOTWreverseLRCheckbox" type="checkbox" />
				<label for="UFOTWreverseLRCheckbox">UFOTW左右反転</label>
			</li>
			<li class="UFOTWsettingli" style="display: none;">
				<input id="VorzeSAScriptToUFOTWCheckbox" type="checkbox" />
				<label for="VorzeSAScriptToUFOTWCheckbox">UFOSA用のスクリプトでUFOTWを動かす</label>
			</li>
		</ul>
	</div>
	<div>
		<h3>接続済みデバイス</h3>
		<div id="DeviceListContainer"></div>
	</div>
	<div>
		<h3>読込済みスクリプト</h3>
		<ul id="ScriptList"></ul>
	</div>
	<script type="importmap">
		{
		  "imports": {
			"buttplug": "https://cdn.jsdelivr.net/npm/buttplug@3.2.1/dist/web/buttplug.mjs",
			"buttplug-wasm": "https://cdn.jsdelivr.net/npm/buttplug-wasm@2.0.1/dist/buttplug-wasm.mjs"
		  }
		}
	  </script>

	<script src="main.js" type="module"></script>

</body>

</html>
